name: Build Android App

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Replace android.jar with Hidden API SDK
        run: |
          echo "Setting up modified android.jar for API 36..."
          mkdir -p $ANDROID_HOME/platforms/android-36
          wget https://github.com/Reginer/aosp-android-jar/raw/main/android-36/android.jar -O $ANDROID_HOME/platforms/android-36/android.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RootActivityLauncher-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14
